# Foundry + Solidity Auditor
# Copy this to .github/workflows/solidity-audit.yml in a Foundry project
name: "Solidity Security Audit (Foundry)"

on:
  pull_request:
    paths: ['src/**.sol', 'test/**.sol']

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Audit
        run: |
          git clone --depth 1 https://github.com/shunfeng8421/solidity-auditor.git /tmp/sa
          cd /tmp/sa
          python foundry_adapter.py --dir "$GITHUB_WORKSPACE" --output /tmp/report.json
          
          CRITICAL=$(python -c "import json; print(json.load(open('/tmp/report.json'))['summary']['critical'])")
          echo "Found $CRITICAL critical issues"
          [ "$CRITICAL" -eq 0 ] || exit 1
