# Solidity Auditor — CI/CD Integration
# Copy this file to .github/workflows/solidity-audit.yml in any Solidity project
# Runs on every PR that touches .sol files

name: "Solidity Security Audit"

on:
  pull_request:
    paths:
      - '**.sol'
  push:
    paths:
      - '**.sol'
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git blame/diff

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Solidity Auditor
        run: |
          git clone --depth 1 https://github.com/shunfeng8421/solidity-auditor.git /tmp/solidity-auditor

      - name: Run Audit
        id: audit
        run: |
          cd /tmp/solidity-auditor
          python auditor_v3.py --dir "$GITHUB_WORKSPACE" --output /tmp/audit_report.json

      - name: Check Critical Findings
        id: check
        run: |
          CRITICAL=$(python -c "import json; d=json.load(open('/tmp/audit_report.json')); print(d['summary']['critical'])")
          TOTAL=$(python -c "import json; d=json.load(open('/tmp/audit_report.json')); print(d['summary']['total_findings'])")
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "## Solidity Audit Report" >> $GITHUB_STEP_SUMMARY
          echo "**$TOTAL findings** ($CRITICAL critical)" >> $GITHUB_STEP_SUMMARY

      - name: Post PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('/tmp/audit_report.json'));
            const s = report.summary;
            
            let body = `## 🔒 Solidity Security Audit\n\n`;
            body += `**${s.total_findings} findings** | **${s.critical} critical**\n\n`;
            
            if (s.critical > 0) {
              body += `### ⚠️ Critical Issues Found\n\n`;
              for (const r of report.reports.slice(0, 5)) {
                const crits = r.findings.details.filter(f => f.severity === 'critical');
                for (const f of crits.slice(0, 3)) {
                  body += `- **${r.file}** L${f.line || '?'}: ${f.detail}\n`;
                }
              }
              body += `\n> 🚨 Please fix critical findings before merging.\n`;
            } else if (s.total_findings > 0) {
              body += `✅ No critical issues. ${s.total_findings} suggestions for improvement.\n`;
            } else {
              body += `✅ No issues found. All checks passed.\n`;
            }
            
            body += `\n---\n*Audited by [Solidity Auditor v4](https://github.com/shunfeng8421/solidity-auditor)*`;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail on Critical
        if: steps.check.outputs.critical != '0'
        run: |
          echo "❌ Found ${{ steps.check.outputs.critical }} critical findings"
          exit 1
